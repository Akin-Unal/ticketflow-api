services:
  api:
    build: .
    container_name: ticketflow-api-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      APP_NAME: TicketFlow API
      APP_ENV: development
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ticketflow_api_db
      JWT_SECRET_KEY: change-this-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: '${CORS_ORIGINS}'
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketflow_api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketflow_api_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
